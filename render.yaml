services:
  # Backend API
  - type: web
    name: smartphone-addiction-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_HOST
        fromDatabase:
          name: smartphone-addiction-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smartphone-addiction-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: smartphone-addiction-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: smartphone-addiction-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smartphone-addiction-db
          property: password
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false

databases:
  - name: smartphone-addiction-db
    databaseName: smartphone_addiction
    user: smartphone_user
    plan: free
