services:
  # Backend API
  - type: web
    name: smartphone-addiction-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

databases:
  - name: smartphone-addiction-db
    databaseName: smartphone_addiction
    user: smartphone_user
    plan: free
